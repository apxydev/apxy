name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: APXY Version
      description: "Run `apxy version` and paste the output"
      placeholder: "APXY v1.0.1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Other
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Which interface?
      options:
        - CLI
        - Web GUI
        - MCP (AI agent)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: "When I run `apxy rules mock add ...`, I get the following error..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected the mock rule to be created successfully."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "Step-by-step instructions to reproduce the issue"
      placeholder: |
        1. Run `apxy proxy start`
        2. Run `apxy rules mock add --name "test" --url "/api" --match exact --status 200 --body '{}'`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: "Paste any relevant logs or error messages (run with `--verbose` if possible)"
      render: shell
