schema: spec-driven

context: |
  ## Repository: apxy
  Public OSS repository for APXY. Contains user-facing documentation, examples,
  install scripts, skill definitions, and pre-built mock templates.

  ## Structure
  - docs/: user documentation (getting-started, user-guide, troubleshooting, faq)
  - examples/: usage examples (basic-debugging, api-mocking, ai-agent-workflow)
  - scripts/: install/uninstall scripts (platform detection, PATH setup)
  - skills/: SKILL.md skill definitions for AI agents
  - mock-templates/: pre-built mock rule sets

  ## Build & Verify
  - Verify install script: `bash -n scripts/install.sh`

  ## Conventions
  - Markdown docs follow standard structure with clear headings
  - Examples are self-contained and runnable
  - Install scripts support macOS, Linux; detect architecture (amd64/arm64)
  - Skills follow the SKILL.md format for AI agent consumption

rules:
  proposal:
    - Always include a "Non-goals" section
    - Specify which directory/content area is affected
  tasks:
    - Break tasks into chunks of max 2 hours
    - Include verification step (`bash -n scripts/install.sh` for scripts)
  spec:
    - Documentation must be clear and user-facing
    - Examples must be self-contained and testable
    - Scripts must handle error cases and provide clear output
